name: go-tests

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions: {}

jobs:
  go-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      stable: ${{ steps.versions.outputs.GO_MINOR_VERSION_STABLE }}
      previous: ${{ steps.versions.outputs.GO_MINOR_VERSION_PREVIOUS }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Determine Go versions
      id: versions
      uses: carabiner-dev/actions/go/versions@360ffa1eb909b0105d4eccb6d6ef337911c34952 # main

  test:
    needs: go-versions
    name: Go Tests (go ${{ matrix.go-version }}, ${{ matrix.os }})
    permissions:
      contents: read

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version:
          - ${{ needs.go-versions.outputs.previous }}
          - ${{ needs.go-versions.outputs.stable }}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}
        check-latest: true
        cache: true

    - name: Test
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        go get -d ./...
        go test -v ./...

  spire:
    needs: go-versions
    name: SPIFFE E2E Tests (SPIRE fixture)
    # Linux-only: hack/spire uses `pid: host` in docker-compose, and only
    # Linux runners have Docker pre-installed. No secrets/OIDC needed, so
    # this runs on fork PRs too — the fixture is fully local.
    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ needs.go-versions.outputs.stable }}
        check-latest: true
        cache: true

    - name: Start SPIRE fixture
      run: make spire-up

    - name: Run SPIFFE E2E tests
      run: make spiffe-tests

    - name: Dump SPIRE logs on failure
      if: failure()
      run: cd hack/spire && docker compose logs --no-color --tail=200

    - name: Tear down SPIRE fixture
      if: always()
      run: make spire-down

  e2e:
    needs: go-versions
    name: E2E Tests (go ${{ matrix.go-version }}, ${{ matrix.os }})
    # Run on pushes, workflow_dispatch, and non-fork PRs (forks can't mint OIDC tokens)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      id-token: write # needed for keyless signing
      contents: read

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version:
          - ${{ needs.go-versions.outputs.previous }}
          - ${{ needs.go-versions.outputs.stable }}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}
        check-latest: true
        cache: true

    - name: E2E signing tests
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        go get -d ./...
        go test -v -tags=e2e -run TestSignAndVerify ./...
