name: refresh-roots

on:
  schedule:
    # Weekly, Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions: {}

jobs:
  refresh-roots:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the refresh branch
      pull-requests: write  # open the refresh PR

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Refresh embedded trusted roots
        run: go run ./hack/refresh-roots

      - name: Verify refreshed roots are fresh
        env:
          SIGNER_CHECK_ROOT_FRESHNESS: "1"
        run: go test -v -run TestTrustedRootFreshness ./sigstore/

      - name: Open pull request with the refreshed roots
        # No-op when the refresh produced no changes to the tracked paths.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: automated/refresh-trusted-roots
          delete-branch: true
          add-paths: |
            sigstore/sigstore-roots.json
            sigstore/roots/*.trusted_root.json
          commit-message: "Refresh embedded sigstore trusted roots"
          title: "Refresh embedded sigstore trusted roots"
          body: |
            Automated weekly refresh of the embedded sigstore trusted roots.

            Generated by the `refresh-roots` workflow, which runs
            `go run ./hack/refresh-roots` to re-fetch each instance's
            `trusted_root.json` over TUF and bump its `trusted-root-snapshot`
            in `sigstore/sigstore-roots.json`.
