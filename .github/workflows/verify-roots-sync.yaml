name: verify-roots-sync

on:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  verify-roots-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Verify signing configs are in sync with upstream
      run: bash hack/roots-verify.sh
