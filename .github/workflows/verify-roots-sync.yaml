name: verify-roots-sync

on:
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  verify-roots-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Verify signing configs are in sync with upstream
      run: bash hack/roots-verify.sh
